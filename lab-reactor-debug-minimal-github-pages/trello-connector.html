<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lab Reactor Trello Connector</title>
</head>
<body>
  <p>Lab Reactor Trello Connector chargé.</p>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>
    /* global TrelloPowerUp */
    (function() {
      var APP_URL = "https://ma007ma.github.io/Jarvis-Para-trello/app.html?v=debug-minimal-20260708";
      TrelloPowerUp.initialize({
        "card-buttons": function(t, opts) {
          return [{
            text: "Lab Reactor TEST",
            condition: "always",
            callback: function(t) {
              return t.modal({
                title: "Lab Reactor TEST",
                url: APP_URL,
                fullscreen: false,
                height: 500
              });
            }
          }];
        },
        "board-buttons": function(t, opts) {
          return [{
            text: "Lab Reactor TEST",
            condition: "always",
            callback: function(t) {
              return t.modal({
                title: "Lab Reactor TEST",
                url: APP_URL,
                fullscreen: false,
                height: 500
              });
            }
          }];
        }
      }, {
        appKey: "lab-reactor-debug"
      });
    })();
  </script>
</body>
</html>
