<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab Reactor Trello Connector</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f7f4ff; color: #271343; }
      main { min-height: 100vh; display: grid; place-items: center; padding: 24px; text-align: center; }
      strong { color: #6d28d9; }
    </style>
  </head>
  <body>
    <main>
      <div>
        <strong>Lab Reactor</strong>
        <p>Connecteur Trello chargé. Ouvrez une carte Trello pour afficher la fiche.</p>
      </div>
    </main>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
      (function () {
        var PANEL_URL = './lab.html?panel=lab&v=lab-reactor-stable';

        function signedUrl(t) {
          return t && t.signUrl ? t.signUrl(PANEL_URL) : PANEL_URL;
        }

        function openPanel(t) {
          return t.modal({
            title: 'Lab Reactor',
            url: signedUrl(t),
            height: 920,
            fullscreen: true
          });
        }

        if (!window.TrelloPowerUp) return;

        window.TrelloPowerUp.initialize({
          'card-buttons': function () {
            return [{ text: 'Lab Reactor', callback: openPanel }];
          },
          'board-buttons': function () {
            return [{ text: 'Lab Reactor', callback: openPanel }];
          },
          'card-back-section': function (t) {
            return {
              title: 'Lab Reactor',
              icon: 'https://ma007ma.github.io/Jarvis-Para-trello/favicon.svg',
              content: {
                type: 'iframe',
                url: signedUrl(t),
                height: 760
              }
            };
          }
        });
      })();
    </script>
  </body>
</html>
